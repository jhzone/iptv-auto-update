# 每天自动获取 iptv-org 中国频道，转换成 IPTV-API result.txt 格式

name: IPTV Daily Update

on:
  schedule:
    # 每天北京时间 7:00 (UTC 00:00)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run IPTV converter
        run: python3 convert_iptv.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-results
          path: |
            output/result.txt
            output/result.m3u
          retention-days: 30

      - name: Push to TVbox repo
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone --depth=1 https://x-access-token:${IPTV_TOKEN}@github.com/jhzone/TVbox.git /tmp/tvbox-iptv
          cp output/result.txt /tmp/tvbox-iptv/result.txt
          cp output/result.m3u /tmp/tvbox-iptv/result.m3u
          cd /tmp/tvbox-iptv
          git add result.txt result.m3u
          if ! git diff --cached --quiet; then
            git commit -m "📺 Update IPTV result from iptv-org ($(date +'%Y-%m-%d'))"
            git push https://x-access-token:${IPTV_TOKEN}@github.com/jhzone/TVbox.git main
          else
            echo "No changes in TVbox repo"
          fi
        env:
          IPTV_TOKEN: ${{ secrets.IPTV_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/result.txt output/result.m3u
          if ! git diff --cached --quiet; then
            git commit -m "📺 Daily IPTV update $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
